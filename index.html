<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Special Delivery 🫰</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* ЯРКАЯ МАТРИЦА 💗 */
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            z-index: 10;
            cursor: pointer;
            perspective: 1000px;
        }

        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 50px rgba(255, 105, 180, 0.4);
        }

        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-top: 110px solid #f0f0f0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            z-index: 5;
            transform-origin: top;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ПИСЬМО С СЮРПРИЗОМ */
        .letter {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 280px;
            height: 180px;
            background: #fff;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: transform 0.8s ease-in-out;
            border-radius: 5px;
            padding: 10px;
            box-sizing: border-box;
        }

        .letter h1 {
            color: #ff0040;
            font-size: 22px;
            margin: 0;
            line-height: 1.4;
            font-weight: 900;
        }

        .pocket {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-top: 100px solid transparent;
            border-left: 150px solid #fff;
            border-right: 150px solid #fff;
            border-bottom: 100px solid #fff;
            z-index: 4;
            border-radius: 0 0 10px 10px;
        }

        .stamp {
            position: absolute;
            top: 75px;
            left: 125px;
            width: 50px;
            height: 50px;
            background: #ff0040;
            border-radius: 50%;
            z-index: 6;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 25px;
            border: 3px solid #fff;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.5);
            transition: 0.3s;
        }

        /* АНИМАЦИЯ ОТКРЫТИЯ */
        .open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .open .letter {
            transform: translateY(-130px);
            z-index: 10;
        }

        .open .stamp {
            opacity: 0;
            transform: scale(0);
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="envelope-wrapper" onclick="this.classList.add('open')">
        <div class="flap"></div>
        <div class="envelope">
            <div class="letter">
                <h1>Стервочка,<br>иди в жопу 🫰</h1>
            </div>
            <div class="pocket"></div>
            <div class="stamp">💗</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const sticker = "💗";
        const fontSize = 20;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = Array(columns).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + "px serif";
            
            for (let i = 0; i < drops.length; i++) {
                // Делаем сердечки максимально яркими
                ctx.fillStyle = (drops[i] === 0) ? "#ffffff" : "#ff69b4";
                
                ctx.fillText(sticker, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.98) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 50);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
